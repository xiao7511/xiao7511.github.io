<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>动漫推荐 - DorisY</title>
    <style>
        /* 复用主页全局样式 */
        * {margin:0; padding:0; box-sizing:border-box;}
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #FF6EC7 0%, #6EC1FF 100%);
            color: #fff; min-height: 100vh; padding-top: 80px;
        }
        .header {
            position: fixed; top:0; width:100%; height:70px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            display: flex; align-items:center; justify-content:space-between;
            padding: 0 5%; z-index:1000;
        }
        .nav {display:flex; gap:20px;}
        .nav-item {cursor:pointer; font-size: 14px; text-decoration: none; color: #fff;}

        /* 推荐页特有样式 */
        .filter-container { padding: 20px 5%; text-align: center; }
        .filter-btn {
            padding: 8px 20px; margin: 5px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.2);
            color: #fff; cursor: pointer; transition: 0.3s;
        }
        .filter-btn.active { background: #FFE066; color: #333; font-weight: bold; }
        
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; padding: 20px 5%; }
        .card { background: rgba(0,0,0,0.3); border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-title { font-weight: bold; margin-bottom: 5px; }
        .card-tag { font-size: 12px; color: #FFE066; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="location.href='index.html'">DorisY动漫</div>
        <div class="nav">
            <a href="index.html" class="nav-item">首页</a>
            <a href="recommend.html" class="nav-item" style="color:#FFE066">动漫推荐</a>
            <a href="manga.html" class="nav-item">漫画连载</a>
            <a href="community.html" class="nav-item">社区</a>
        </div>
    </div>

    <div class="filter-container">
        <h2>发现精彩动漫</h2>
        <div style="margin-top: 15px;">
            <button class="filter-btn active">全部</button>
            <button class="filter-btn">热血</button>
            <button class="filter-btn">治愈</button>
            <button class="filter-btn">异世界</button>
        </div>
    </div>

    <div class="cards" id="anime-list">
        <!-- 静态示例，后续可接入 Supabase -->
        <div class="card">
            <img src="https://picsum.photos/300/400?random=1">
            <div class="card-info">
                <div class="card-title">咒术回战</div>
                <div class="card-tag">热血 / 战斗</div>
            </div>
        </div>
        <!-- 更多卡片... -->
    </div>

    <footer style="text-align:center; padding:50px; opacity:0.7; font-size:12px;">© 2026 DorisY Anime</footer>
</body>
</html>
