<title>二次元动漫首页</title>
<!-- Google Fonts 可替换为本地中文字体 -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* 全局样式 */
  * {margin:0; padding:0; box-sizing:border-box;}
  body {
    font-family: "Helvetica Neue", Helvetica, Arial, "Microsoft Yahei", sans-serif;
    background: linear-gradient(135deg, #FF6EC7 0%, #6EC1FF 100%);
    color: #fff;
    overflow-x: hidden;
    line-height: 1.6;
  }
  a {text-decoration:none; color:inherit;}

  /* 顶部导航 */
  .header {
    position: fixed; top:0; width:100%; min-height:70px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
    display: flex; align-items:center; justify-content:space-between;
    padding: 0 5%; z-index:1000;
    flex-wrap: wrap; /* 允许手机端换行 */
  }
  .logo {font-size:20px; font-weight:bold; cursor:pointer; padding: 10px 0;}
  .nav {display:flex; gap:20px;}
  .nav-item {cursor:pointer; transition:0.3s; font-size: 14px;}
  .nav-item:hover {transform: scale(1.1); color:#FFE066;}

  /* Banner轮播 - 手机端高度调小 */
  .banner {position:relative; width:100%; height:50vh; min-height:300px; overflow:hidden; margin-top:70px;}
  .banner img {
    width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0;
    opacity:0; transition:opacity 1s ease-in-out;
  }
  .banner img.active {opacity:1;}

  /* 推荐模块 */
  .section {padding: 60px 5%;}
  .section h2 {font-size:28px; margin-bottom:25px; text-align: center; text-shadow:1px 1px 5px rgba(0,0,0,0.3);}
  
  /* 响应式卡片布局：使用 Grid 自动排列 */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
    gap: 20px;
  }
  .card {
    border-radius: 12px; overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.3); background:#222; transition:transform 0.3s;
    cursor:pointer; display: flex; flex-direction: column;
  }
  .card:hover {transform: translateY(-5px);}
  .card img {width:100%; aspect-ratio: 3/4; object-fit:cover;}
  .card .info {padding:12px;}
  .card .title {font-size:16px; font-weight:bold; margin-bottom:5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
  .card .tags {font-size:12px; color:#FFE066;}
  /* 社区模块 */
  .community {background:rgba(0,0,0,0.2); border-radius:12px; padding:20px; margin-top:30px;}
  .post {display:flex; align-items:flex-start; gap:15px; margin-bottom:20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;}
  .post img {width:45px; height:45px; border-radius:50%; flex-shrink: 0;}
  .post .content {flex:1;}
  .post .username {font-weight:bold; margin-bottom:5px; color: #FFE066;}
  .post .text {font-size:14px; line-height:1.5;}
  /* 页脚 */
  footer {
    padding:30px 20px; text-align:center; font-size: 12px;
    background: rgba(0,0,0,0.3); margin-top:50px; opacity: 0.8;
  }
  /* 核心响应式调整 */
  @media(max-width:768px){
    .header { justify-content: center; padding: 5px 10px; }
    .logo { width: 100%; text-align: center; font-size: 18px; }
    .nav { gap: 10px; padding-bottom: 10px; }
    .nav-item { font-size: 12px; }
    
    .banner { height: 250px; margin-top: 100px; } /* 手机端导航变高了，Banner下移更多 */
    
    .section h2 { font-size: 22px; }
    .cards { grid-template-columns: repeat(2, 1fr); } /* 手机端每行强制显示两个卡片 */
  }
  /* 默认样式：针对电脑端（大屏幕） */
body {
    font-size: 18px;
}
.container {
    width: 80%; /* 居中显示，两边留白 */
    margin: 0 auto;
    display: flex; /* 电脑端左右排列 */
}

/* 响应式样式：针对手机端（屏幕宽度小于 768px） */
@media (max-width: 768px) {
    body {
        font-size: 16px; /* 手机端字体稍微调小 */
    }
    .container {
        width: 95%; /* 手机端占满屏幕，减少留白 */
        flex-direction: column; /* 左右排列变为上下堆叠 */
    }
    .sidebar {
        display: none; /* 手机端可以隐藏不重要的侧边栏 */
    }
}
</style>

<!-- JS轮播 -->
<script>
let banners = document.querySelectorAll('.banner img');
let index = 0;
setInterval(() => {
  banners[index].classList.remove('active');
  index = (index + 1) % banners.length;
  banners[index].classList.add('active');
}, 4000);
</script>
