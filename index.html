<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DorisY动漫世界</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* --- 原有全局样式 --- */
  * {margin:0; padding:0; box-sizing:border-box;}
  body {
    font-family: "Helvetica Neue", Helvetica, Arial, "Microsoft Yahei", sans-serif;
    background: linear-gradient(135deg, #FF6EC7 0%, #6EC1FF 100%);
    color: #fff; overflow-x: hidden; line-height: 1.6;
  }
  
  /* --- 导航栏 --- */
  .header {
    position: fixed; top:0; width:100%; min-height:70px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
    display: flex; align-items:center; justify-content:space-between;
    padding: 0 5%; z-index:1000;
    flex-wrap: wrap; /* 允许手机端换行 */
  }
  .logo {font-size:20px; font-weight:bold; cursor:pointer;}
  .nav {display:flex; gap:20px;}
  .nav-item {cursor:pointer; transition:0.3s; font-size: 14px;}
  .nav-item:hover {color:#FFE066;}

  /* --- 模态框 (Auth Modal) 样式 --- */
  .auth-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center;
  }
  .auth-box {
    background: #1a1a1a; border: 2px solid #FF6EC7; padding: 30px; border-radius: 20px;
    width: 380px; position: relative; box-shadow: 0 0 30px rgba(255, 110, 199, 0.5);
    text-align: center;
  }
  .close-btn { position: absolute; right: 20px; top: 15px; cursor: pointer; font-size: 24px; color: #aaa; }
  .auth-tabs { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; }
  .tab { cursor: pointer; font-size: 18px; padding-bottom: 5px; color: #888; }
  .tab.active { color: #FFE066; border-bottom: 2px solid #FFE066; }

  form input {
    width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; 
    border: 1px solid #333; background: #2b2b2b; color: #fff; outline: none;
  }
  form button {
    width: 100%; padding: 12px; background: #FF6EC7; border: none; color: #fff; 
    border-radius: 10px; cursor: pointer; margin-top: 15px; font-weight: bold; font-size: 16px;
  }
  
  /* 头像选择器 */
  .avatar-selector { margin: 15px 0; }
  .avatar-selector p { font-size: 13px; color: #FFE066; margin-bottom: 10px; }
  .avatar-options { display: flex; gap: 15px; justify-content: center; }
  .avatar-options img { 
    width: 55px; height: 55px; border-radius: 50%; cursor: pointer; 
    border: 3px solid transparent; background: #333; transition: 0.3s;
  }
  .avatar-options img.selected { border-color: #FFE066; transform: scale(1.1); }

  /* --- 原有其他样式 (省略部分以节省篇幅，保持你的不变) --- */
  /* Banner轮播 - 手机端高度调小 */
  .banner {position:relative; width:100%; height:50vh; min-height:300px; overflow:hidden; margin-top:70px;}
  .banner img {
    width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0;
    opacity:0; transition:opacity 1s ease-in-out;
  }
  .banner img.active {opacity:1;}

  /* 推荐模块 */
  .section {padding: 60px 5%;}
  .section h2 {font-size:28px; margin-bottom:25px; text-align: center; text-shadow:1px 1px 5px rgba(0,0,0,0.3);}
  
  /* 响应式卡片布局：使用 Grid 自动排列 */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
    gap: 20px;
  }
  .card {
    border-radius: 12px; overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.3); background:#222; transition:transform 0.3s;
    cursor:pointer; display: flex; flex-direction: column;
  }
  .card:hover {transform: translateY(-5px);}
  .card img {width:100%; aspect-ratio: 3/4; object-fit:cover;}
  .card .info {padding:12px;}
  .card .title {font-size:16px; font-weight:bold; margin-bottom:5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
  .card .tags {font-size:12px; color:#FFE066;}
  /* 社区模块 */
  .community {background:rgba(0,0,0,0.2); border-radius:12px; padding:20px; margin-top:30px;}
  .post {display:flex; align-items:flex-start; gap:15px; margin-bottom:20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;}
  .post img {width:45px; height:45px; border-radius:50%; flex-shrink: 0;}
  .post .content {flex:1;}
  .post .username {font-weight:bold; margin-bottom:5px; color: #FFE066;}
  .post .text {font-size:14px; line-height:1.5;}
  /* 页脚 */
  footer {
    padding:30px 20px; text-align:center; font-size: 12px;
    background: rgba(0,0,0,0.3); margin-top:50px; opacity: 0.8;
  }
  /* 核心响应式调整 */
  @media(max-width:768px){
    .header { justify-content: center; padding: 5px 10px; }
    .logo { width: 100%; text-align: center; font-size: 18px; }
    .nav { gap: 10px; padding-bottom: 10px; }
    .nav-item { font-size: 12px; }
    
    .banner { height: 250px; margin-top: 100px; } /* 手机端导航变高了，Banner下移更多 */
    
    .section h2 { font-size: 22px; }
    .cards { grid-template-columns: repeat(2, 1fr); } /* 手机端每行强制显示两个卡片 */
  }
  /* 默认样式：针对电脑端（大屏幕） */
body {
    font-size: 18px;
}
.container {
    width: 80%; /* 居中显示，两边留白 */
    margin: 0 auto;
    display: flex; /* 电脑端左右排列 */
}

/* 响应式样式：针对手机端（屏幕宽度小于 768px） */
@media (max-width: 768px) {
    body {
        font-size: 16px; /* 手机端字体稍微调小 */
    }
    .container {
        width: 95%; /* 手机端占满屏幕，减少留白 */
        flex-direction: column; /* 左右排列变为上下堆叠 */
    }
    .sidebar {
        display: none; /* 手机端可以隐藏不重要的侧边栏 */
    }
}
</style>
</head>

<script>
    // 1. 初始化 Supabase
    const supabaseUrl = 'https://kogjjfccyncdszuuwlun.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvZ2pqZmNjeW5jZHN6dXV3bHVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODEwMDksImV4cCI6MjA5MDQ1NzAwOX0.JIjUQdbZYUM6Cu57pFVwVzrlTrvyYmFyE9eBRlR9Sec';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const authModal = document.getElementById('auth-modal');
    const userBtn = document.getElementById('user-btn');
    let selectedAvatar = "https://api.dicebear.com/7.x/bottts/svg?seed=Neko";

    // 2. 检查登录状态并获取昵称
   async function checkSession() {
    // 1. 从 Supabase 获取当前登录的用户信息
    const { data: { user } } = await _supabase.auth.getUser();    
    // 定位导航栏上的那个“登录/注册”按钮
    const userBtn = document.getElementById('user-btn'); 
    if (user) {
        // --- 已登录状态 ---
        // 2. 去 profiles 表根据用户 ID 查找昵称
        // 注意：这里需要确保你注册时已经把昵称存进了 profiles 表
        const { data: profile, error } = await _supabase
            .from('profiles')
            .select('nickname')
            .eq('id', user.id)
            .single();
        if (profile && profile.nickname) {
            // 3. 将按钮文字修改为昵称
            userBtn.innerText = "欢迎，" + profile.nickname;
        } else {
            // 如果没设昵称，显示邮箱前缀作为备选
            userBtn.innerText = user.email.split('@')[0];
        }
        // 顺便显示发帖区域
        const postArea = document.getElementById('post-area');
        if (postArea) postArea.style.display = 'block';
    } else {
        // --- 未登录状态 ---
        userBtn.innerText = "登录/注册";
    }
}
    checkSession();
    // 3. UI 交互逻辑
    userBtn.onclick = () => authModal.style.display = 'flex';
    document.getElementById('modal-close').onclick = () => authModal.style.display = 'none';

    function selAvatar(el) {
        document.querySelectorAll('.avatar-options img').forEach(img => img.classList.remove('selected'));
        el.classList.add('selected');
        selectedAvatar = el.src;
    }
    // 切换登录/注册表单
    document.getElementById('tab-login').onclick = () => {
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('reg-form').style.display = 'none';
        document.getElementById('tab-login').classList.add('active');
        document.getElementById('tab-reg').classList.remove('active');
    }
    document.getElementById('tab-reg').onclick = () => {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('reg-form').style.display = 'block';
        document.getElementById('tab-reg').classList.add('active');
        document.getElementById('tab-login').classList.remove('active');
    }
    // 4. 注册逻辑
    document.getElementById('reg-form').onsubmit = async (e) => {
        e.preventDefault();
        const nick = document.getElementById('reg-nickname').value;
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-password').value;

        const { data, error } = await _supabase.auth.signUp({ email, password: pass });
        if (error) alert("注册失败: " + error.message);
        else {
            // 写入关联表 profiles
            await _supabase.from('profiles').insert([{ id: data.user.id, nickname: nick, avatar_url: selectedAvatar }]);
            alert("注册成功！请刷新页面登录");
            location.reload();
        }
    }
    // 5. 登录逻辑
    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const email = e.target[0].value;
        const pass = e.target[1].value;

        const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
        if (error) alert("登录失败: " + error.message);
        else {
            alert("欢迎来到二次元世界！");
            location.reload();
        }
    }
  async function forgotPassword() {
      const email = document.getElementById('login-email').value;
      if (!email) {
          alert("请先在邮箱框输入你的账号！");
          return;
      }
      const { error } = await _supabase.auth.resetPasswordForEmail(email, {
          // 重置链接点击后跳转回来的地址（填你的 GitHub Pages 网址）
          redirectTo: 'https://xiao7511.github.io/index.html', 
      });
  
      if (error) alert("发送失败: " + error.message);
      else alert("重置邮件已发送！请去邮箱查收链接。");
  }
  // 在页面加载时自动执行
  _supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === "PASSWORD_RECOVERY") {
          // 1. 自动打开模态框
          document.getElementById('auth-modal').style.display = 'flex';
          // 2. 隐藏登录/注册表单，显示重置密码表单
          document.getElementById('login-form').style.display = 'none';
          document.getElementById('reg-form').style.display = 'none';
          document.getElementById('reset-password-form').style.display = 'block';
          document.querySelector('.auth-tabs').style.display = 'none'; // 隐藏切换标签
      }
  });
  document.getElementById('reset-password-form').onsubmit = async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('new-password').value;
      const { error } = await _supabase.auth.updateUser({ password: newPassword });  
      if (error) {
          alert("修改失败: " + error.message);
      } else {
          alert("密码修改成功！请重新登录。");
          location.reload(); // 刷新页面
      }
  };
async function publishPost() {
    const content = document.getElementById('post-content').value;
    if (!content) return alert("内容不能为空喵！");

    const { data: { user } } = await _supabase.auth.getUser();
    // 先获取当前用户的 Profile 信息（昵称和头像）
    const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();

    const { error } = await _supabase.from('posts').insert([
        { 
            content: content, 
            user_id: user.id, 
            nickname: profile.nickname, 
            avatar_url: profile.avatar_url 
        }
    ]);

    if (error) alert("发布失败: " + error.message);
    else {
        document.getElementById('post-content').value = '';
        loadPosts(); // 刷新列表
    }
}
async function loadPosts() {
    // 1. 获取数据
    const { data: posts, error } = await _supabase
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) return console.error("加载失败:", error);

    // 2. 锁定专门存帖子的容器
    const listDiv = document.getElementById('posts-list');
    
    let html = '';
    posts.forEach(post => {
        html += `
            <div class="post">
                <img src="${post.avatar_url}" alt="头像">
                <div class="content">
                    <div class="username">${post.nickname}</div>
                    <div class="text">${post.content}</div>
                    <div style="font-size:10px; color:#888; margin-top:5px;">
                        ${new Date(post.created_at).toLocaleString()}
                    </div>
                </div>
            </div>
        `;
    });

    // 3. 只更新列表部分，发帖栏在外面不受影响
    listDiv.innerHTML = html;
}
    // 原有轮播逻辑
    let banners = document.querySelectorAll('.banner img');
    let idx = 0;
    setInterval(() => {
        banners[idx].classList.remove('active');
        idx = (idx + 1) % banners.length;
        banners[idx].classList.add('active');
    }, 4000);
</script>
