<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>DorisY动漫世界</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* --- 全局与导航 --- */
  * {margin:0; padding:0; box-sizing:border-box;}
  body {
    font-family: "Helvetica Neue", Helvetica, Arial, "Microsoft Yahei", sans-serif;
    background: linear-gradient(135deg, #FF6EC7 0%, #6EC1FF 100%);
    color: #fff; overflow-x: hidden; line-height: 1.6;
  }
  .header {
    position: fixed; top:0; width:100%; min-height:70px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
    display: flex; align-items:center; justify-content:space-between;
    padding: 0 5%; z-index:1000; flex-wrap: wrap;
  }
  .logo {font-size:20px; font-weight:bold; cursor:pointer;}
  .nav {display:flex; gap:20px;}
  .nav-item {cursor:pointer; transition:0.3s; font-size: 14px;}
  .nav-item:hover {color:#FFE066;}

  /* --- 模态框 --- */
  .auth-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center;
  }
  .auth-box {
    background: #1a1a1a; border: 2px solid #FF6EC7; padding: 30px; border-radius: 20px;
    width: 380px; position: relative; box-shadow: 0 0 30px rgba(255, 110, 199, 0.5);
    text-align: center;
  }
  .close-btn { position: absolute; right: 20px; top: 15px; cursor: pointer; font-size: 24px; color: #aaa; }
  .auth-tabs { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; }
  .tab { cursor: pointer; font-size: 18px; padding-bottom: 5px; color: #888; }
  .tab.active { color: #FFE066; border-bottom: 2px solid #FFE066; }

  form input, form textarea {
    width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; 
    border: 1px solid #333; background: #2b2b2b; color: #fff; outline: none;
  }
  form button {
    width: 100%; padding: 12px; background: #FF6EC7; border: none; color: #fff; 
    border-radius: 10px; cursor: pointer; margin-top: 15px; font-weight: bold; font-size: 16px;
  }
  .avatar-options img { width: 55px; height: 55px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
  .avatar-options img.selected { border-color: #FFE066; transform: scale(1.1); }
/* --- 内容板块 --- */
  .banner {position:relative; width:100%; height:50vh; min-height:300px; overflow:hidden; margin-top:70px;}
  .banner img {width:100%; height:100%; object-fit:cover; position:absolute; opacity:0; transition:opacity 1s;}
  .banner img.active {opacity:1;}
  .section {padding: 60px 5%;}
  .cards {display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px;}
  .card {border-radius: 12px; overflow:hidden; background:#222; transition:0.3s; cursor:pointer;}
  .card:hover {transform: translateY(-5px);}
  .card img {width:100%; aspect-ratio: 3/4; object-fit:cover;}
  .card .info {padding:12px;}
  .community {background:rgba(0,0,0,0.2); border-radius:12px; padding:20px; margin-top:30px;}
  .post {display:flex; align-items:flex-start; gap:15px; margin-bottom:20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;}
  .post img {width:45px; height:45px; border-radius:50%;}
  footer {padding:30px 20px; text-align:center; font-size: 12px; background: rgba(0,0,0,0.3); margin-top:50px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">DorisY动漫世界</div>
  <div class="nav">
    <div class="nav-item">首页</div>
    <div class="nav-item">动漫推荐</div>
    <div class="nav-item">漫画连载</div>
    <div class="nav-item">社区</div>
    <div id="user-btn" class="nav-item">登录/注册</div>
  </div>
</div>

<div id="auth-modal" class="auth-overlay">
    <div class="auth-box">
        <span class="close-btn" id="modal-close">&times;</span>
        <div class="auth-tabs">
            <div class="tab active" id="tab-login">登录</div>
            <div class="tab" id="tab-reg">注册</div>
        </div>

        <form id="login-form">
            <input type="email" id="login-email" placeholder="邮箱" required>
            <input type="password" id="login-pass" placeholder="密码" required>
            <p style="text-align: right;"><a href="javascript:void(0)" onclick="forgotPassword()" style="font-size: 12px; color: #FFE066;">忘记密码？</a></p>
            <button type="submit">进入异世界</button>
        </form>
        
        <form id="reset-password-form" style="display:none;">
            <p style="color:#FFE066">设置新密码</p>
            <input type="password" id="new-password" placeholder="新密码 (至少6位)" required>
            <button type="submit">确认修改</button>
        </form>

        <form id="reg-form" style="display:none;">
            <div class="avatar-selector">
                <p>选择你的萌系头像</p>
                <div class="avatar-options">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Neko" class="selected" onclick="selAvatar(this)">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Miku" onclick="selAvatar(this)">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Zoro" onclick="selAvatar(this)">
                </div>
            </div>
            <input type="text" id="reg-nickname" placeholder="动漫昵称" required>
            <input type="email" id="reg-email" placeholder="邮箱" required>
            <input type="password" id="reg-password" placeholder="密码 (至少6位)" required>
            <button type="submit">创建角色</button>
        </form>
    </div>
</div>

<div class="banner">
  <img src="images/IMG_4822.jpeg" class="active">
  <img src="images/IMG_4873.png">
  <img src="images/IMG_4886.png">
</div>

<div class="section">
  <h2>热门动漫推荐</h2>
  <div class="cards">
    <div class="card"><img src="images/IMG_4893.png"><div class="info"><b>魔法少女</b><br><small>魔法 / 冒险</small></div></div>
    <div class="card"><img src="images/IMG_4896.png"><div class="info"><b>校园恋爱</b><br><small>恋爱 / 校园</small></div></div>
    <div class="card"><img src="images/IMG_4907.png"><div class="info"><b>战斗冒险</b><br><small>热血 / 冒险</small></div></div>
    <div class="card"><img src="images/IMG_5606.jpeg"><div class="info"><b>异世界</b><br><small>幻想 / 冒险</small></div></div>
  </div>
</div>
<div class="section community">
  <h2>动漫社区热帖</h2>
  <div id="post-area" style="display:none; margin-top:20px;">
    <textarea id="post-content" placeholder="分享你的二次元见闻..."></textarea>
    <button onclick="publishPost()">发布动态</button>
  </div>
  <div id="posts-list" style="margin-top:20px;"></div>
</div>

<footer>© 2026 动漫世界 | 联系方式：xiao.ye751111@outlook.com</footer>

<script>
    const supabaseUrl = 'https://kogjjfccyncdszuuwlun.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvZ2pqZmNjeW5jZHN6dXV3bHVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODEwMDksImV4cCI6MjA5MDQ1NzAwOX0.JIjUQdbZYUM6Cu57pFVwVzrlTrvyYmFyE9eBRlR9Sec';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const authModal = document.getElementById('auth-modal');
    const userBtn = document.getElementById('user-btn');
    let selectedAvatar = "https://api.dicebear.com/7.x/bottts/svg?seed=Neko";

    // --- 核心状态检查 ---
    async function checkSession() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            userBtn.innerText = profile ? "欢迎，" + profile.nickname : "我的主页";
            document.getElementById('post-area').style.display = 'block';
            loadPosts();
        } else {
            loadPosts(); // 游客也能看帖
        }
    }
    // --- UI 逻辑 ---
    userBtn.onclick = () => authModal.style.display = 'flex';
    document.getElementById('modal-close').onclick = () => authModal.style.display = 'none';
    
    function selAvatar(el) {
        document.querySelectorAll('.avatar-options img').forEach(img => img.classList.remove('selected'));
        el.classList.add('selected');
        selectedAvatar = el.src;
    }

    document.getElementById('tab-login').onclick = () => {
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('reg-form').style.display = 'none';
        document.getElementById('tab-login').classList.add('active');
        document.getElementById('tab-reg').classList.remove('active');
    }
    document.getElementById('tab-reg').onclick = () => {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('reg-form').style.display = 'block';
        document.getElementById('tab-reg').classList.add('active');
        document.getElementById('tab-login').classList.remove('active');
    }

    // --- Auth 逻辑 ---
    document.getElementById('reg-form').onsubmit = async (e) => {
        e.preventDefault();
        const nick = document.getElementById('reg-nickname').value;
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-password').value;
        const { data, error } = await _supabase.auth.signUp({ email, password: pass });
        if (error) alert("注册失败: " + error.message);
        else {
            await _supabase.from('profiles').insert([{ id: data.user.id, nickname: nick, avatar_url: selectedAvatar }]);
            alert("注册成功！");
            location.reload();
        }
    }

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
        if (error) alert("登录失败: " + error.message);
        else location.reload();
    }

    async function forgotPassword() {
        const email = document.getElementById('login-email').value;
        if (!email) return alert("请先输入邮箱！");
        const { error } = await _supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
        if (error) alert("发送失败: " + error.message);
        else alert("邮件已发送，请查收！");
    }

    _supabase.auth.onAuthStateChange((event) => {
        if (event === "PASSWORD_RECOVERY") {
            authModal.style.display = 'flex';
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('reg-form').style.display = 'none';
            document.getElementById('reset-password-form').style.display = 'block';
        }
    });

    document.getElementById('reset-password-form').onsubmit = async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('new-password').value;
        const { error } = await _supabase.auth.updateUser({ password: newPassword });
        if (error) alert("失败: " + error.message);
        else { alert("成功！"); location.reload(); }
    };
    // --- BBS 逻辑 ---
    async function publishPost() {
        const content = document.getElementById('post-content').value;
        if (!content) return;
        const { data: { user } } = await _supabase.auth.getUser();
        const { data: p } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
        
        // 兼容拼写错误 avator_url 或 avatar_url
        const { error } = await _supabase.from('posts').insert([{ 
            content: content, 
            user_id: user.id, 
            nickname: p.nickname, 
            avatar_url: p.avatar_url || p.avator_url 
        }]);

        if (error) alert("发布失败: " + error.message);
        else { document.getElementById('post-content').value = ''; loadPosts(); }
    }

    async function loadPosts() {
        const { data: posts } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
        const listDiv = document.getElementById('posts-list');
        listDiv.innerHTML = posts ? posts.map(p => `
            <div class="post">
                <img src="${p.avatar_url || p.avator_url || ''}">
                <div class="content">
                    <div class="username">${p.nickname}</div>
                    <div class="text">${p.content}</div>
                    <small style="color:#888">${new Date(p.created_at).toLocaleString()}</small>
                </div>
            </div>
        `).join('') : '暂无帖子';
    }

    // --- 轮播与启动 ---
    let banners = document.querySelectorAll('.banner img');
    let idx = 0;
    setInterval(() => {
        banners[idx].classList.remove('active');
        idx = (idx + 1) % banners.length;
        banners[idx].classList.add('active');
    }, 4000);

    window.onload = checkSession;
</script>
</body>
</html>
