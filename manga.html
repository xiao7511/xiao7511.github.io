<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画连载 - DorisY</title>
    <style>
        /* 复用全局样式... */
        * {margin:0; padding:0; box-sizing:border-box;}
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding-top: 90px;}
        .header { position: fixed; top:0; width:100%; height:70px; background: #000; display: flex; align-items:center; justify-content:space-between; padding: 0 5%; z-index:1000;}
        .nav {display:flex; gap:20px;}
        .nav-item {color: #fff; text-decoration: none; font-size: 14px;}

        /* 漫画列表样式 */
        .manga-section { padding: 0 5%; }
        .manga-list { display: flex; flex-direction: column; gap: 20px; }
        .manga-item { 
            display: flex; background: #2a2a2a; border-radius: 12px; 
            overflow: hidden; height: 180px; transition: 0.3s;
            border: 1px solid #333;
        }
        .manga-item:hover { border-color: #FF6EC7; background: #333; }
        .manga-cover { width: 130px; height: 100%; object-fit: cover; }
        .manga-detail { padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .manga-title { font-size: 20px; font-weight: bold; color: #FFE066; }
        .manga-meta { font-size: 13px; color: #bbb; }
        .update-badge { background: #FF6EC7; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .read-btn { 
            align-self: flex-start; padding: 8px 20px; 
            background: transparent; border: 1px solid #FF6EC7; 
            color: #FF6EC7; border-radius: 5px; cursor: pointer;
        }
        @media(max-width: 600px) { .manga-item { height: 140px; } .manga-cover { width: 100px; } }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-weight:bold;">DorisY动漫</div>
        <div class="nav">
            <a href="index.html" class="nav-item">首页</a>
            <a href="recommend.html" class="nav-item">动漫推荐</a>
            <a href="manga.html" class="nav-item" style="color:#FFE066">漫画连载</a>
            <a href="community.html" class="nav-item">社区</a>
        </div>
    </div>

    <div class="manga-section">
        <h2 style="margin-bottom: 20px;">最新连载更新</h2>
        <div class="manga-list">
            <!-- 漫画项目 -->
            <div class="manga-item">
                <img src="https://picsum.photos/200/300?random=10" class="manga-cover">
                <div class="manga-detail">
                    <div>
                        <div class="manga-title">辉夜大小姐想让我告白</div>
                        <div class="manga-meta">作者：赤坂明 | 状态：<span class="update-badge">更新中</span></div>
                    </div>
                    <div class="manga-meta">最新章节：第281话 “终焉”</div>
                    <button class="read-btn">开始阅读</button>
                </div>
            </div>
            <!-- 更多漫画... -->
        </div>
    </div>
</body>
</html>
